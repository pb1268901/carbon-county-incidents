<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Carbon County Incident List</title>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    padding: 10px;
    background: #f5f5f5;
    color: #00474f; /* dark blue text for headers and outside table */
}

h2 {
    margin: 0 0 4px 0;
    font-size: 2em; /* bigger title */
    font-weight: bold;
    color: #00474f; /* dark blue */
}

.subtitle {
    font-size: 0.95em;
    color: #00666c; /* darker teal */
    margin-bottom: 8px;
}

.last-update {
    font-size: 0.85em;
    color: #00666c;
    margin-bottom: 12px;
}

.table-wrapper {
    max-height: 600px;
    overflow-y: auto;
    border-radius: 6px;
    background-color: #00474f; /* dark teal background */
    padding: 6px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85em;
    color: #ffffff;
}

thead {
    position: sticky;
    top: 0;
    background: #00666c; /* slightly lighter header */
    z-index: 1;
}

th, td {
    padding: 8px 10px;
    border-bottom: 1px solid #007a80;
    vertical-align: top;
    color: #ffffff;
}

th {
    text-align: left;
    font-weight: 600;
}

/* Status styling */
.status {
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 0.75em;
    display: inline-block;
}

.status-active {
    background: #e53935;
    color: #fff;
}

.status-contained {
    background: #fbc02d;
    color: #000;
}

.status-closed {
    background: #43a047;
    color: #fff;
}

/* Row emphasis */
tr.active-row {
    background: #004f58;
}

tr.closed-row {
    background: #003f45;
}

/* Links */
a.map-link {
    color: #ffcc00;
    text-decoration: none;
    font-weight: 500;
}

a.map-link:hover {
    text-decoration: underline;
}

/* Mobile tweaks */
@media (max-width: 700px) {
    th:nth-child(4),
    td:nth-child(4),
    th:nth-child(6),
    td:nth-child(6),
    th:nth-child(7),
    td:nth-child(7) {
        display: none;
    }

    table {
        font-size: 0.8em;
    }
}
</style>
</head>

<body>

<h2>Incident List</h2>
<div class="subtitle">Ongoing and past incidents</div>
<div class="last-update" id="lastUpdate">Last updated: Loading…</div>

<div class="table-wrapper">
<table id="incidentTable">
    <thead>
        <tr>
            <th>Incident</th>
            <th>Type</th>
            <th>Status</th>
            <th>Start Date</th>
            <th>Location</th>
            <th>Acres</th>
            <th>Contact</th>
            <th>Last Updated</th>
            <th>Map</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td colspan="9">Loading incident data…</td>
        </tr>
    </tbody>
</table>
</div>

<script>
const serviceUrl =
  "https://services1.arcgis.com/lo6DwqkHoBfbpsNX/arcgis/rest/services/Carbon_County_Incidents_(Public)/FeatureServer/0/query";

const webmapId = "67afe6c3c1d54e2ebb4fddad01247797";

function formatDate(value) {
    if (!value) return "N/A";
    const d = new Date(value);
    return isNaN(d) ? "N/A" : d.toLocaleDateString();
}

function statusClass(status) {
    if (!status) return "";
    const s = status.toLowerCase();
    if (s.includes("active")) return "status-active";
    if (s.includes("contain")) return "status-contained";
    if (s.includes("close")) return "status-closed";
    return "";
}

function rowClass(status) {
    if (!status) return "";
    const s = status.toLowerCase();
    if (s.includes("active")) return "active-row";
    if (s.includes("close")) return "closed-row";
    return "";
}

function mapLink(lon, lat) {
    if (lon == null || lat == null) return "#";
    return `https://carbonmt.maps.arcgis.com/apps/mapviewer/index.html?webmap=${webmapId}&center=${lon},${lat}&zoom=13`;
}

function updateTimestamp() {
    document.getElementById("lastUpdate").innerText =
        "Last updated: " + new Date().toLocaleString();
}

async function loadIncidents() {
    try {
        const params = new URLSearchParams({
            where: "1=1",
            outFields: "*",
            returnGeometry: true,
            f: "json"
        });

        const res = await fetch(`${serviceUrl}?${params}`);
        const data = await res.json();

        const tbody = document.querySelector("#incidentTable tbody");
        tbody.innerHTML = "";

        if (!data.features || data.features.length === 0) {
            tbody.innerHTML = "<tr><td colspan='9'>No incidents found.</td></tr>";
            updateTimestamp();
            return;
        }

        data.features.forEach(f => {
            const a = f.attributes;
            const g = f.geometry;

            const tr = document.createElement("tr");
            tr.className = rowClass(a.Status);

            const lon = g ? g.x : null;
            const lat = g ? g.y : null;

            tr.innerHTML = `
                <td><strong>${a.Incident_Name || "Unnamed"}</strong></td>
                <td>${a.Incident_Type || "N/A"}</td>
                <td><span class="status ${statusClass(a.Status)}">${a.Status || "N/A"}</span></td>
                <td>${formatDate(a.Start_Date)}</td>
                <td>${a.Location_Description || "N/A"}</td>
                <td>${a.Size_Acres ? a.Size_Acres.toLocaleString() : "N/A"}</td>
                <td>${a.Contact_Info || "N/A"}</td>
                <td>${formatDate(a.Last_Updated)}</td>
                <td>${lon && lat ? `<a class="map-link" href="${mapLink(lon,lat)}" target="_blank">View</a>` : "—"}</td>
            `;

            tbody.appendChild(tr);
        });

        updateTimestamp();

    } catch (err) {
        console.error(err);
        document.querySelector("#incidentTable tbody").innerHTML =
            "<tr><td colspan='9'>Error loading incident data.</td></tr>";
        updateTimestamp();
    }
}

// initial load
loadIncidents();
// refresh every 5 minutes
setInterval(loadIncidents, 300000);
</script>

</body>
</html>
