<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Carbon County Incident List</title>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    padding: 10px;
    background: #ffffff;
    color: #333;
}

h2 {
    margin: 0 0 4px 0;
    font-size: 1.4em;
}

.subtitle {
    font-size: 0.9em;
    color: #666;
    margin-bottom: 12px;
}

.table-wrapper {
    max-height: 600px;
    overflow-y: auto;
    border: 1px solid #ddd;
    border-radius: 6px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85em;
}

thead {
    position: sticky;
    top: 0;
    background: #f5f5f5;
    z-index: 1;
}

th, td {
    padding: 8px 10px;
    border-bottom: 1px solid #eee;
    vertical-align: top;
}

th {
    text-align: left;
    font-weight: 600;
    color: #444;
}

/* Status styling */
.status {
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 0.75em;
    display: inline-block;
}

.status-active {
    background: #fcebea;
    color: #b71c1c;
}

.status-contained {
    background: #fff8e1;
    color: #8d6e00;
}

.status-closed {
    background: #e8f5e9;
    color: #1b5e20;
}

/* Row emphasis */
tr.active-row {
    background: #fff6f6;
}

tr.closed-row {
    background: #fafafa;
}

/* Links */
a.map-link {
    color: #1a73e8;
    text-decoration: none;
    font-weight: 500;
}

a.map-link:hover {
    text-decoration: underline;
}

/* Mobile tweaks for Hub narrow columns */
@media (max-width: 700px) {
    th:nth-child(4),
    td:nth-child(4),
    th:nth-child(6),
    td:nth-child(6),
    th:nth-child(7),
    td:nth-child(7) {
        display: none;
    }

    table {
        font-size: 0.8em;
    }
}
</style>
</head>

<body>

<h2>Incident List</h2>
<div class="subtitle">Ongoing and past incidents</div>

<div class="table-wrapper">
<table id="incidentTable">
    <thead>
        <tr>
            <th>Incident</th>
            <th>Type</th>
            <th>Status</th>
            <th>Start Date</th>
            <th>Location</th>
            <th>Acres</th>
            <th>Contact</th>
            <th>Last Updated</th>
            <th>Map</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td colspan="9">Loading incident data…</td>
        </tr>
    </tbody>
</table>
</div>

<script>
const serviceUrl =
  "https://services1.arcgis.com/lo6DwqkHoBfbpsNX/arcgis/rest/services/Carbon_County_Incidents_(Public)/FeatureServer/0/query";

function formatDate(value) {
    if (!value) return "N/A";
    const d = new Date(value);
    return isNaN(d) ? "N/A" : d.toLocaleDateString();
}

function statusClass(status) {
    if (!status) return "";
    const s = status.toLowerCase();
    if (s.includes("active")) return "status-active";
    if (s.includes("contain")) return "status-contained";
    if (s.includes("close")) return "status-closed";
    return "";
}

function rowClass(status) {
    if (!status) return "";
    const s = status.toLowerCase();
    if (s.includes("active")) return "active-row";
    if (s.includes("close")) return "closed-row";
    return "";
}

function mapLink(geometry) {
    if (!geometry) return "";
    const lat = geometry.y;
    const lon = geometry.x;
    return `https://www.arcgis.com/apps/mapviewer/index.html?center=${lon},${lat}&zoom=13`;
}

fetch(serviceUrl + "?" + new URLSearchParams({
    where: "1=1",
    outFields: "*",
    returnGeometry: true,
    f: "json"
}))
.then(r => r.json())
.then(data => {
    const tbody = document.querySelector("#incidentTable tbody");
    tbody.innerHTML = "";

    if (!data.features || data.features.length === 0) {
        tbody.innerHTML = "<tr><td colspan='9'>No incidents found.</td></tr>";
        return;
    }

    data.features.forEach(f => {
        const a = f.attributes;
        const g = f.geometry;

        const tr = document.createElement("tr");
        tr.className = rowClass(a.Status);

        tr.innerHTML = `
            <td><strong>${a.Incident_Name || "Unnamed Incident"}</strong></td>
            <td>${a.Incident_Type || "N/A"}</td>
            <td><span class="status ${statusClass(a.Status)}">${a.Status || "N/A"}</span></td>
            <td>${formatDate(a.Start_Date)}</td>
            <td>${a.Location_Description || "N/A"}</td>
            <td>${a.Size_Acres ? a.Size_Acres.toLocaleString() : "N/A"}</td>
            <td>${a.Contact_Info || "N/A"}</td>
            <td>${formatDate(a.Last_Updated)}</td>
            <td>${g ? `<a class="map-link" href="${mapLink(g)}" target="_blank">View</a>` : "—"}</td>
        `;

        tbody.appendChild(tr);
    });
})
.catch(err => {
    console.error(err);
    document.querySelector("#incidentTable tbody").innerHTML =
        "<tr><td colspan='9'>Error loading incident data.</td></tr>";
});
</script>

</body>
</html>
